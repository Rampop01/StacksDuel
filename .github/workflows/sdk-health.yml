name: SDK Health & Integration Monitoring

on:
  schedule:
    - cron: '*/30 * * * *' # Every 30 minutes
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  health-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Execute Isolated Verifier
        run: |
          mkdir tmp-verify
          cd tmp-verify
          npm init -y
          npm install stacksduel-sdk@latest
          echo "📦 Testing Registry Version of stacksduel-sdk..."
          node ../sdk/test-sdk.js
        env:
          RPC_URL: "https://api.mainnet.hiro.so"

      - name: Report Metrics
        if: always()
        run: echo "SDK Health Check Completed Successfully at $(date)"
