<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StacksDuel PRO | Control Room</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen p-8">
    
    <header class="max-w-7xl mx-auto flex justify-between items-center mb-12">
        <div>
            <h1 class="text-4xl font-extrabold tracking-tighter gradient-text">STACKS_DUEL_PRO</h1>
            <p class="text-slate-400 mt-1 flex items-center"><span class="live-dot"></span> Network Live | Leaderboard Sync Active</p>
        </div>
        <button id="connect-btn" class="px-6 py-2 rounded-full border border-slate-700 bg-slate-900/50 hover:bg-slate-800 transition">Connect Wallet</button>
    </header>

    <main class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-3 gap-8">
        
        <!-- DASHBOARD STATS -->
        <div class="lg:col-span-2 space-y-8">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="glass">
                    <p class="text-slate-400 text-sm">Total Duels</p>
                    <p class="text-3xl font-bold">1,204</p>
                </div>
                <div class="glass">
                    <p class="text-slate-400 text-sm">On-Chain Votes</p>
                    <p class="text-3xl font-bold">18,452</p>
                </div>
                <div class="glass">
                    <p class="text-slate-400 text-sm">NFTs Minted</p>
                    <p class="text-3xl font-bold">19,656</p>
                </div>
            </div>

            <!-- ACTIVE BATTLES -->
            <div>
                <h2 class="text-2xl font-bold mb-6">Trending Battles</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6" id="battle-grid">
                    <!-- Battle 1 -->
                    <div class="glass">
                        <div class="flex justify-between items-start mb-4">
                            <span class="px-3 py-1 bg-violet-500/20 text-violet-400 rounded-full text-xs font-bold">ACTIVE</span>
                            <span class="text-slate-500 text-xs">#402</span>
                        </div>
                        <h3 class="text-xl font-bold mb-4">Bitcoin vs Ethereum</h3>
                        <div class="space-y-3">
                            <button class="w-full py-3 rounded-xl border border-blue-500/30 bg-blue-500/10 hover:bg-blue-500/20 transition">Bitcoin (64%)</button>
                            <button class="w-full py-3 rounded-xl border border-pink-500/30 bg-pink-500/10 hover:bg-pink-500/20 transition">Ethereum (36%)</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- SIDEBAR: LIVE ACTIVITY -->
        <div class="space-y-8">
            <div class="glass h-[600px] flex flex-col">
                <h2 class="text-xl font-bold mb-4">Live Activity Bot</h2>
                <div class="flex-1 overflow-y-auto space-y-4 pr-2 custom-scrollbar" id="activity-feed">
                    <div class="text-sm border-b border-slate-800 pb-2">
                        <span class="text-violet-400">SP3Z...XYZ</span> <span class="text-slate-500 uppercase text-[10px]">created</span> <span class="text-white">New Duel</span>
                    </div>
                    <!-- Feed items populated by JS -->
                </div>
                <button class="mt-6 w-full py-4 btn-pulse rounded-xl font-bold">CREATE NEW DUEL</button>
            </div>
        </div>

    </main>

    <script src="https://unpkg.com/@stacks/connect@latest/dist/index.js"></script>
    <script src="app.js"></script>
</body>
</html>
